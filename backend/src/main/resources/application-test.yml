spring:
  datasource:
    url: jdbc:h2:mem:eventhub;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true

management:
  health:
    redis:
      enabled: false
